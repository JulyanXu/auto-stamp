name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: false
        default: "v0.1.0"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller auto_stamp.spec --distpath dist-win --workpath build-win

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist-win\Auto-Stamp\* -DestinationPath dist-win\Auto-Stamp-Windows.zip

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Auto-Stamp ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: dist-win/Auto-Stamp-Windows.zip
          body: |
            ## Auto-Stamp ${{ steps.version.outputs.version }}

            批量 PDF 盖章工具 - Windows 版

            ### 使用方法
            1. 解压 `Auto-Stamp-Windows.zip`
            2. 双击 `Auto-Stamp.exe` 启动（浏览器会自动打开）
            3. 上传印章 PNG，上传样本文档设置位置，批量处理文件

            ### 系统要求
            - Windows 10 / 11 (64-bit)
            - 无需安装 Python 或其他依赖
